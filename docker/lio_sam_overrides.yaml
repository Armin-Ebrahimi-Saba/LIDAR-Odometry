# Overrides layered on top of LIO_SAM_6AXIS's config/params_vlp.yaml.
# Loaded AFTER params_vlp.yaml in docker/lio_sam.launch, so only the keys that
# differ for the Sensys data need to appear here (rosparam merges dicts).
lio_sam_6axis:
  # Topics produced by scripts/build_ros1_bag.py
  pointCloudTopic: "/points_raw"
  imuTopic: "/imu_raw"

  # Ouster geometry as fed by the converter (velodyne PointXYZIRT layout,
  # ring synthesized into 32 beams, ~2048 azimuth columns).
  sensor: velodyne
  N_SCAN: 32
  Horizon_SCAN: 2048
  downsampleRate: 1
  lidarMinRange: 1.0
  lidarMaxRange: 100.0

  # 6-axis IMU (accel+gyro only, no usable orientation -> /ouster/imu_att is
  # dead, so heading init off). ~100 Hz.
  imuType: 0
  useImuHeadingInitialization: false
  imuGravity: 9.80511
  imuRPYWeight: 0.01

  # No GPS factor (LiDAR-inertial only, by design). useGPS:true makes
  # mapOptimization gate initialization on a synced GPS message and spin
  # forever on "sysyem need to be initialized" if none arrives -- so it must be
  # false here to take the IMU-only init branch.
  useGPS: false
  useGpsElevation: false
  gpsCovThreshold: 999.0

  # IMU -> LiDAR extrinsic. The raw accelerometer reports gravity as ~-9.6 on Z;
  # LIO-SAM requires +g on Z at rest or it diverges. A 180 deg rotation about X
  # (flip Y and Z) puts gravity on +Z while remaining a proper rotation.
  # If the map/heading look wrong, try 180 about Y instead: [-1,0,0, 0,1,0, 0,0,-1].
  extrinsicTrans: [0.0, 0.0, 0.0]
  extrinsicRot: [1, 0, 0,
                 0, -1, 0,
                 0, 0, -1]
  extrinsicRPY: [1, 0, 0,
                 0, -1, 0,
                 0, 0, -1]

  # Save the dense map on the save_map service call. mapOptmization prepends
  # $HOME to this path, so run_lio_sam.sh sets HOME=/work -> /work/outputs/...
  savePCD: true
  savePCDDirectory: "/outputs/test1_liosam/lio_map/"
